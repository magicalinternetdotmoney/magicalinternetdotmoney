# FluxBeam pool indexer + router — deploy: `fly deploy` (from flux-router-service/).
app = "mim-flux-router"
primary_region = "iad"

[build]

[env]
  DATA_DIR = "/data"
  FLUX_GPA_PAGE = "1000"
  RESERVE_CHUNK = "100"

[mounts]
  source = "flux_pools"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
[toolchain]
anchor_version = "0.31.1"
solana_version = "3.1.10"

[features]
resolution = true
skip-lint = false

# Deploy workspace programs with the upgradeable loader.
# Agave 3.x refuses to execute programs loaded under the legacy non-upgradeable
# BPFLoader2 (anchor's default `--bpf-program`), which surfaces as
# "This program may not be used for executing instructions" during `anchor test`.
[test]
upgradeable = true

[programs.localnet]
transfer_hook = "DuPvWH63wQCw9sA3KRvFuipRkLDhh2TU7gEBJTNQSij6"
leverage_engine = "Een1a526XFdTeSBjdBzU83sotriogcj4hBXsaCs8AaHx"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Magical Internet Money — fly.io app config.  Deploy: `fly deploy` (from site/).
app = "magic-internet-money"
primary_region = "iad"

[build]

[env]
  SITE_ORIGIN = "https://magicalinternet.money"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

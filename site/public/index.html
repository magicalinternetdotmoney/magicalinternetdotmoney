<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Magical Internet Money</title>
<meta name="description" content="Mainnet alpha: leveraged synthetic pairs on Raydium CP-Swap with Token-2022 receipt LPs. Unaudited experimental software — verify program and txs on-chain." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background:#07070b; font-family:'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden; }
  ::selection { background: rgba(160,107,255,0.35); }
  input { font-family: inherit; }
  input::placeholder { color:#54546a; }
  button { font-family:'Space Grotesk', system-ui, sans-serif; }
  [data-press]:active { transform: scale(0.99); }
  @keyframes mim-spin { to { transform: rotate(360deg); } }
  @keyframes mim-floaty { 0%,100% { transform:translateY(0);} 50% { transform:translateY(-7px);} }
  @keyframes mim-rise { from { opacity:0; transform:translateY(14px);} to { opacity:1; transform:translateY(0);} }
  @keyframes mim-pop { from { opacity:0; transform:translateY(16px) scale(.985);} to { opacity:1; transform:none;} }
  @keyframes mim-fadein { from { opacity:0;} to { opacity:1;} }
  @keyframes mim-shimmer { to { background-position: 220% center; } }
  @keyframes mim-grain { 0%{transform:translate(0,0)}20%{transform:translate(-4%,3%)}40%{transform:translate(3%,-5%)}60%{transform:translate(-2%,4%)}80%{transform:translate(4%,-2%)}100%{transform:translate(0,0)} }
  @keyframes mim-dot { 0%,100% { opacity:.25;} 50% { opacity:1;} }
</style>
</head>
<body>
<div id="app"></div>
<script src="/launchflow.js"></script>
<script src="/app.js"></script>
</body>
</html>
